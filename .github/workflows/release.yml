name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--mac"
          - os: windows-latest
            args: "--win"
          - os: ubuntu-latest
            args: "--linux AppImage deb"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # don't attempt macOS code-signing in CI
        run: npx --no-install electron-builder ${{ matrix.args }} --publish always

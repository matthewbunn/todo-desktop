name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  # AppImage + .deb — the always-reliable Linux installers.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build AppImage + deb and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install electron-builder --linux AppImage deb --publish always
        # Note: snap isn't built in CI (snapcraft needs a desktop keyring that
        # headless runners lack). Build it locally with `npm run dist:snap`.

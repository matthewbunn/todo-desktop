<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>To-Do — Connect</title>
<style>
  :root { color-scheme: light dark; }
  body { margin:0; height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#16181d; color:#e4e6eb; }
  .box { width:360px; max-width:88vw; background:#1f2329; border:1px solid #2e333b;
    border-radius:14px; padding:1.6rem; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  h1 { font-size:1.1rem; margin:0 0 .3rem; }
  p { color:#8a919c; font-size:.85rem; margin:.2rem 0 1rem; }
  input { width:100%; box-sizing:border-box; font:inherit; color:#e4e6eb; background:#16181d;
    border:1px solid #2e333b; border-radius:8px; padding:.6rem; outline:none; margin-bottom:.6rem; }
  input:focus { border-color:#4a7dff; }
  button { width:100%; border:0; border-radius:8px; background:#4a7dff; color:#fff;
    padding:.65rem; font:inherit; cursor:pointer; }
  .err { color:#e74c3c; font-size:.8rem; min-height:1rem; margin-bottom:.4rem; }
  .hint { font-size:.72rem; color:#6b727c; margin-top:.8rem; }
</style>
</head>
<body>
  <div class="box">
    <h1>Connect to your To-Do server</h1>
    <p>Enter the address where your board is running.</p>
    <div class="err" id="err"></div>
    <input id="url" placeholder="http://192.168.1.50:8090" autofocus>
    <button id="go">Connect</button>
    <div class="hint">Use your server's address on your network, e.g. <code>http://192.168.1.50:8090</code></div>
  </div>
<script>
  (async () => {
    const cur = await window.todo.getServerUrl();
    if (cur) document.getElementById("url").value = cur;
  })();
  async function connect() {
    const url = document.getElementById("url").value;
    const res = await window.todo.saveServerUrl(url);
    if (!res.ok) document.getElementById("err").textContent = res.error || "Could not save";
  }
  document.getElementById("go").onclick = connect;
  document.getElementById("url").addEventListener("keydown", (e) => { if (e.key === "Enter") connect(); });
</script>
</body>
</html>
